name: app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0-290.4.beta

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.8.3

  # Formatting & preferences
  intl: ^0.19.0
  shared_preferences: ^2.2.2

  # Networking
  http: ^1.2.1

  # Media & files
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  share_plus: ^9.0.0

  # Permissions
  permission_handler: ^11.3.0

  # Google Sign-In & Drive
  google_sign_in: ^6.2.1
  googleapis: ^13.0.0

  # ── Background sync ──────────────────────────────────────────────────────────
  # Runs the two-way Drive sync as a scheduled Android WorkManager task.
  # Works even when the app is closed, killed from recents, or after reboot.
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
