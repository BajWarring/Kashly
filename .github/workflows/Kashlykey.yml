name: 3. Generate Kashly Keystore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate keystore
        run: |
          keytool -genkey -v \
          -keystore kashly-keystore.jks \
          -storepass 284619 \
          -keypass 284619 \
          -alias Kashly \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Kashly,O=Kashly,L=Unknown,S=Unknown,C=IN"

      - name: Convert to Base64
        run: base64 kashly-keystore.jks > keystore.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kashly-keystore
          path: |
            kashly-keystore.jks
            keystore.txt
